name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev build-essential \
            ccache git zip unzip openjdk-17-jdk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36 kivy==2.3.1 Pillow pytest rich

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: field-hockey-manager-apk
          path: bin/*.apk
          retention-days: 30