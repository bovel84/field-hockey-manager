name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest rich kivy==2.3.1 Pillow
      - run: python -m pytest tests/ -q

  build:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev libltdl-dev \
            ccache git zip unzip

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Accept Android SDK licenses for Buildozer
        run: |
          LICENSE_DIR="$HOME/.buildozer/android/platform/android-sdk/licenses"
          mkdir -p "$LICENSE_DIR"
          {
            echo "24333f8a63b6825ea9c5514f83c2829b004d1fee"
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e"
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55"
          } > "$LICENSE_DIR/android-sdk-license"

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_WARN: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: field-hockey-manager-apk
          path: ./bin/*.apk
          if-no-files-found: error
          retention-days: 30