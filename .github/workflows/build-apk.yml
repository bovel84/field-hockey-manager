name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate Python sources
        run: |
          python -m compileall -q main.py mobile src
          pip install pytest rich
          python -m pytest tests/ -q

  build:
    needs: test
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            libbz2-dev libsqlite3-dev libltdl-dev \
            ccache git zip unzip

      - name: Install stable Buildozer toolchain
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_WARN: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: field-hockey-manager-1.2.0-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
